name: TrimQ CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'common/**'
      - 'services/**'
      - 'pom.xml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'common/**'
      - 'services/**'
      - 'pom.xml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/trimq

jobs:
  # ==================== DETECT CHANGES ====================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      common: ${{ steps.changes.outputs.common }}
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      user-service: ${{ steps.changes.outputs.user-service }}
      shop-service: ${{ steps.changes.outputs.shop-service }}
      booking-service: ${{ steps.changes.outputs.booking-service }}
      payment-service: ${{ steps.changes.outputs.payment-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            common:
              - 'common/**'
              - 'pom.xml'
            api-gateway:
              - 'services/api-gateway/**'
              - 'common/**'
              - 'pom.xml'
            user-service:
              - 'services/user-service/**'
              - 'common/**'
              - 'pom.xml'
            shop-service:
              - 'services/shop-service/**'
              - 'common/**'
              - 'pom.xml'
            booking-service:
              - 'services/booking-service/**'
              - 'common/**'
              - 'pom.xml'
            payment-service:
              - 'services/payment-service/**'
              - 'common/**'
              - 'pom.xml'
            notification-service:
              - 'services/notification-service/**'
              - 'common/**'
              - 'pom.xml'

  # ==================== BUILD COMMON MODULE ====================
  build-common:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.common == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Common Module
        run: ./mvnw install -pl common -am -DskipTests -B
      
      - name: Run Tests
        run: ./mvnw test -pl common -B
      
      - name: Upload Common Artifact
        uses: actions/upload-artifact@v4
        with:
          name: common-module
          path: common/target/*.jar
          retention-days: 1

  # ==================== BUILD & PUSH API GATEWAY ====================
  build-api-gateway:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-common]
    if: |
      always() && 
      (needs.detect-changes.outputs.api-gateway == 'true' || needs.detect-changes.outputs.common == 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build API Gateway
        run: ./mvnw package -pl services/api-gateway -am -DskipTests -B
      
      - name: Run Tests
        run: ./mvnw test -pl services/api-gateway -B
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api-gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== BUILD & PUSH USER SERVICE ====================
  build-user-service:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-common]
    if: |
      always() && 
      (needs.detect-changes.outputs.user-service == 'true' || needs.detect-changes.outputs.common == 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build User Service
        run: ./mvnw package -pl services/user-service -am -DskipTests -B
      
      - name: Run Tests
        run: ./mvnw test -pl services/user-service -B
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/user-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/user-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== BUILD & PUSH SHOP SERVICE ====================
  build-shop-service:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-common]
    if: |
      always() && 
      (needs.detect-changes.outputs.shop-service == 'true' || needs.detect-changes.outputs.common == 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Shop Service
        run: ./mvnw package -pl services/shop-service -am -DskipTests -B
      
      - name: Run Tests
        run: ./mvnw test -pl services/shop-service -B
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/shop-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shop-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shop-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== BUILD & PUSH BOOKING SERVICE ====================
  build-booking-service:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-common]
    if: |
      always() && 
      (needs.detect-changes.outputs.booking-service == 'true' || needs.detect-changes.outputs.common == 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Booking Service
        run: ./mvnw package -pl services/booking-service -am -DskipTests -B
      
      - name: Run Tests
        run: ./mvnw test -pl services/booking-service -B
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/booking-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/booking-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/booking-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== BUILD & PUSH PAYMENT SERVICE ====================
  build-payment-service:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-common]
    if: |
      always() && 
      (needs.detect-changes.outputs.payment-service == 'true' || needs.detect-changes.outputs.common == 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Payment Service
        run: ./mvnw package -pl services/payment-service -am -DskipTests -B
      
      - name: Run Tests
        run: ./mvnw test -pl services/payment-service -B
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/payment-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== BUILD & PUSH NOTIFICATION SERVICE ====================
  build-notification-service:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-common]
    if: |
      always() && 
      (needs.detect-changes.outputs.notification-service == 'true' || needs.detect-changes.outputs.common == 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Notification Service
        run: ./mvnw package -pl services/notification-service -am -DskipTests -B
      
      - name: Run Tests
        run: ./mvnw test -pl services/notification-service -B
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/notification-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/notification-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOYMENT SUMMARY ====================
  deployment-summary:
    runs-on: ubuntu-latest
    needs:
      - build-api-gateway
      - build-user-service
      - build-shop-service
      - build-booking-service
      - build-payment-service
      - build-notification-service
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 TrimQ Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | ${{ needs.build-api-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| User Service | ${{ needs.build-user-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shop Service | ${{ needs.build-shop-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Booking Service | ${{ needs.build-booking-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Payment Service | ${{ needs.build-payment-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Notification Service | ${{ needs.build-notification-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Deployment Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Deploy to Kubernetes" >> $GITHUB_STEP_SUMMARY
          echo "kubectl apply -k k8s/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Restart deployments to pull new images" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout restart deployment -n trimq-app" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

