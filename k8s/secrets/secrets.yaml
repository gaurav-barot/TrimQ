---
# Database Secrets
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: trimq-data
type: Opaque
stringData:
  POSTGRES_USER: trimq
  POSTGRES_PASSWORD: trimq123
  POSTGRES_DB: trimq

---
# Application Secrets (for trimq-app namespace)
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: trimq-app
type: Opaque
stringData:
  # Database
  POSTGRES_USER: trimq
  POSTGRES_PASSWORD: trimq123
  POSTGRES_DB: trimq
  
  # JWT
  JWT_SECRET: trimq-super-secret-key-for-jwt-token-generation-min-256-bits-required-for-production
  
  # Razorpay (replace with actual keys)
  RAZORPAY_KEY_ID: rzp_test_xxxxxxxxxxxx
  RAZORPAY_KEY_SECRET: xxxxxxxxxxxxxxxxxxxx
  RAZORPAY_WEBHOOK_SECRET: xxxxxxxxxxxx
  
  # Twilio (replace with actual keys)
  TWILIO_ACCOUNT_SID: your-account-sid
  TWILIO_AUTH_TOKEN: your-auth-token
  TWILIO_FROM_NUMBER: "+1234567890"
  TWILIO_ENABLED: "false"
  
  # SendGrid/SMTP
  MAIL_HOST: smtp.sendgrid.net
  MAIL_PORT: "587"
  MAIL_USERNAME: apikey
  MAIL_PASSWORD: your-sendgrid-api-key
  EMAIL_FROM: noreply@trimq.in
  EMAIL_ENABLED: "true"

