# Kubernetes-specific configuration
spring:
  datasource:
    url: jdbc:postgresql://postgresql.trimq-data.svc.cluster.local:5432/trimq
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  
  data:
    redis:
      host: redis.trimq-data.svc.cluster.local
      port: 6379

# Production logging
logging:
  level:
    root: INFO
    com.trimq.shop: INFO

