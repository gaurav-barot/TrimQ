server:
  port: 8084

spring:
  application:
    name: payment-service
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trimq}
    username: ${POSTGRES_USER:trimq}
    password: ${POSTGRES_PASSWORD:trimq123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata
    open-in-view: false
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_xxxxxxxxxxxx}
  key-secret: ${RAZORPAY_KEY_SECRET:xxxxxxxxxxxxxxxxxxxx}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:xxxxxxxxxxxx}
  currency: INR
  receipt-prefix: TQ

# Booking Service URL (for confirming bookings)
booking-service:
  url: ${BOOKING_SERVICE_URL:http://localhost:8083}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    com.trimq.payment: DEBUG

