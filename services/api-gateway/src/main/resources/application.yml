server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # Redis for Rate Limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  
  cloud:
    gateway:
      # Global CORS is handled by Nginx - disabled here to prevent duplicates
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
      
      # Default filters applied to all routes
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      
      # Route definitions
      routes:
        # ==================== USER SERVICE (8081) ====================
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service
        
        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service
        
        # ==================== SHOP SERVICE (8082) ====================
        - id: shop-service-public
          uri: ${SHOP_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/shops/**, /api/v1/shops/search
            - Method=GET
          filters:
            - name: CircuitBreaker
              args:
                name: shopServiceCB
                fallbackUri: forward:/fallback/shop-service
        
        - id: shop-service-protected
          uri: ${SHOP_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/shops/**, /api/v1/services/**, /api/v1/staff/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: shopServiceCB
                fallbackUri: forward:/fallback/shop-service
        
        # ==================== BOOKING SERVICE (8083) ====================
        - id: booking-service-slots
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/slots/**
            - Method=GET
          filters:
            - name: CircuitBreaker
              args:
                name: bookingServiceCB
                fallbackUri: forward:/fallback/booking-service
        
        - id: booking-service-bookings
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: bookingServiceCB
                fallbackUri: forward:/fallback/booking-service
        
        # ==================== PAYMENT SERVICE (8084) ====================
        - id: payment-service-webhook
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/payments/webhook
            - Method=POST
          filters:
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment-service
        
        - id: payment-service-protected
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment-service

# ==================== RESILIENCE4J CIRCUIT BREAKER ====================
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      userServiceCB:
        baseConfig: default
      shopServiceCB:
        baseConfig: default
      bookingServiceCB:
        baseConfig: default
      paymentServiceCB:
        baseConfig: default
  
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true

# ==================== JWT CONFIGURATION ====================
jwt:
  secret: ${JWT_SECRET:trimq-super-secret-key-for-jwt-token-generation-min-256-bits-required}
  expiration: ${JWT_EXPIRATION:86400000}

# ==================== ACTUATOR & METRICS ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    com.trimq.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

