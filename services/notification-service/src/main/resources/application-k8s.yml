spring:
  datasource:
    url: jdbc:postgresql://postgresql.trimq-data:5432/trimq
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  
  kafka:
    bootstrap-servers: kafka.trimq-data:9092
  
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

# Twilio from secrets
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  from-number: ${TWILIO_FROM_NUMBER}
  enabled: ${TWILIO_ENABLED:true}

# Email settings
email:
  from: ${EMAIL_FROM:noreply@trimq.in}
  from-name: TrimQ
  enabled: true

# Kubernetes-specific logging
logging:
  level:
    root: INFO
    com.trimq.notification: INFO

