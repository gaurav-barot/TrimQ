server:
  port: 8085

spring:
  application:
    name: notification-service
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trimq}
    username: ${POSTGRES_USER:trimq}
    password: ${POSTGRES_PASSWORD:trimq123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata
    open-in-view: false
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.trimq.common.event
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.Map
  
  # Email Configuration (SendGrid/SMTP)
  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:your-sendgrid-api-key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    default-encoding: UTF-8
  
  # Thymeleaf for email templates
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false

# Twilio SMS Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your-account-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your-auth-token}
  from-number: ${TWILIO_FROM_NUMBER:+1234567890}
  enabled: ${TWILIO_ENABLED:false}

# Email settings
email:
  from: ${EMAIL_FROM:noreply@trimq.in}
  from-name: ${EMAIL_FROM_NAME:TrimQ}
  enabled: ${EMAIL_ENABLED:true}

# Notification settings
notification:
  retry:
    max-attempts: 3
    delay-ms: 5000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.trimq.notification: DEBUG
    org.springframework.kafka: WARN

