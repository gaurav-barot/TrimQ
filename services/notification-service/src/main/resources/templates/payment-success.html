<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
        }
        .content {
            padding: 30px;
        }
        .success-badge {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
        }
        .amount-display {
            text-align: center;
            margin: 30px 0;
        }
        .amount {
            font-size: 48px;
            font-weight: 700;
            color: #10b981;
        }
        .details-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            color: #6c757d;
        }
        .detail-value {
            font-weight: 600;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TrimQ</h1>
        </div>
        
        <div class="content">
            <div class="success-badge">
                <h2>✓ Payment Successful</h2>
            </div>
            
            <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
            <p>We have received your payment. Thank you!</p>
            
            <div class="amount-display">
                <div class="amount">₹<span th:text="${amount}">300</span></div>
                <div style="color: #6c757d;">Payment Received</div>
            </div>
            
            <div class="details-card">
                <div class="detail-row">
                    <span class="detail-label">Transaction ID</span>
                    <span class="detail-value" th:text="${transactionId}">pay_xxxxx</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date</span>
                    <span class="detail-value" th:text="${date}">01 Jan 2025</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" style="color: #10b981;">Successful</span>
                </div>
            </div>
            
            <p style="margin-top: 20px;">Your booking is now confirmed. You will receive a separate email with booking details.</p>
        </div>
        
        <div class="footer">
            <p>© 2025 TrimQ. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
